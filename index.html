<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f4ecdf" />
  <title>tasks</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon1.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="tasks" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="atmosphere" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="masthead">
    <div class="mh-left">
      <div class="brand">
        <span class="brand-mark"></span>
        <span class="brand-text">tasks</span>
      </div>
    </div>
    <div class="mh-center">
      <span class="sync-pill" id="syncPill">
        <span class="sync-dot"></span>
        <span id="syncStatus">connecting</span>
      </span>
    </div>
    <div class="mh-right">
      <button class="me-pill" id="mePill" aria-label="switch identity">
        <span class="me-dot" aria-hidden="true"></span>
        <span class="me-text">i'm <span id="meLabel">oliver</span></span>
      </button>
    </div>
  </header>

  <main class="page">

    <!-- new-tasks notification banner -->
    <div class="notif-banner" id="newTasksBanner" hidden>
      <span class="notif-icon" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </span>
      <span class="notif-text" id="newTasksText"></span>
      <button class="notif-dismiss" id="newTasksDismiss" aria-label="dismiss">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6l-12 12"/></svg>
      </button>
    </div>

    <section class="hero">
      <p class="hero-date" id="heroDate">—</p>
      <h1 class="hero-title">what needs <em>doing</em>?</h1>
    </section>

    <section class="quick-add">
      <div class="qa-glow" aria-hidden="true"></div>
      <div class="qa-inner">
        <div class="qa-head">
          <span class="qa-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 13.7 8.3 19 10 13.7 11.7 12 17 10.3 11.7 5 10 10.3 8.3z"/><path d="M19 16v4M21 18h-4M5 17v3M6.5 18.5h-3"/></svg>
          </span>
          <span class="qa-label">quick capture</span>
          <span class="qa-hint">name · date · urgency · #tag</span>
        </div>
        <textarea
          id="quickInput"
          class="qa-textarea"
          placeholder="oliver call gym about #d1fitness tomorrow!! · josh post for #socialmedia thurs"
          rows="2"
          autocomplete="off"
          autocorrect="on"
          autocapitalize="none"
          spellcheck="true"
        ></textarea>
        <div class="qa-actions">
          <span class="qa-status" id="quickStatus"></span>
          <button class="btn btn-primary" id="addBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-spark"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></svg>
            <span>add</span>
          </button>
        </div>
      </div>
    </section>

    <div class="toolbar">
      <div class="toolbar-group">
        <span class="toolbar-label">sort</span>
        <select id="sortMode" class="toolbar-select" aria-label="sort tasks">
          <option value="priority">by priority</option>
          <option value="due">by due date</option>
          <option value="newest">newest first</option>
          <option value="oldest">oldest first</option>
        </select>
      </div>
      <div class="toolbar-group">
        <span class="toolbar-label">filter</span>
        <select id="filterTag" class="toolbar-select" aria-label="filter by tag">
          <option value="">all tags</option>
        </select>
      </div>
    </div>

    <div class="columns">
      <section class="person person-oliver">
        <header class="person-head">
          <div class="avatar"><span>o</span></div>
          <div class="person-meta">
            <h2 class="person-name">oliver</h2>
            <span class="person-count" id="oliverCount">— / —</span>
          </div>
        </header>
        <ul class="task-list" id="oliverList"></ul>
        <form class="manual-add" data-person="oliver">
          <input
            type="text"
            placeholder="add a task… (try ‘call mum tomorrow!! #joshpersonal’)"
            class="manual-input"
            autocomplete="off"
            autocorrect="on"
            autocapitalize="none"
            spellcheck="true"
          />
          <button type="submit" class="manual-btn" aria-label="add task for oliver">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </form>
      </section>

      <section class="person person-josh">
        <header class="person-head">
          <div class="avatar"><span>j</span></div>
          <div class="person-meta">
            <h2 class="person-name">josh</h2>
            <span class="person-count" id="joshCount">— / —</span>
          </div>
        </header>
        <ul class="task-list" id="joshList"></ul>
        <form class="manual-add" data-person="josh">
          <input
            type="text"
            placeholder="add a task… (try ‘call mum tomorrow!! #joshpersonal’)"
            class="manual-input"
            autocomplete="off"
            autocorrect="on"
            autocapitalize="none"
            spellcheck="true"
          />
          <button type="submit" class="manual-btn" aria-label="add task for josh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </form>
      </section>
    </div>

    <footer class="page-footer">
      <span>synced via firebase</span>
      <span class="sep">·</span>
      <button class="link-btn" id="clearDoneBtn">clear completed</button>
    </footer>
  </main>

  <!-- Date picker modal -->
  <div class="date-modal" id="dateModal" hidden aria-hidden="true">
    <div class="date-modal-backdrop" id="dateModalBackdrop"></div>
    <div class="date-modal-sheet" role="dialog" aria-labelledby="dateModalTitle">
      <div class="date-modal-handle" aria-hidden="true"></div>
      <div class="date-modal-header">
        <h3 id="dateModalTitle">set due date</h3>
        <button class="date-modal-close" id="dateModalClose" aria-label="close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6l-12 12"/></svg>
        </button>
      </div>
      <div class="date-modal-body">
        <p class="date-modal-section-label">quick</p>
        <div class="date-modal-quick" id="dateQuickRow">
          <button class="date-quick" data-offset="0">today</button>
          <button class="date-quick" data-offset="1">tomorrow</button>
        </div>
        <div class="date-modal-days" id="dateDayRow">
          <button class="date-day" data-day="1">mon</button>
          <button class="date-day" data-day="2">tue</button>
          <button class="date-day" data-day="3">wed</button>
          <button class="date-day" data-day="4">thu</button>
          <button class="date-day" data-day="5">fri</button>
          <button class="date-day" data-day="6">sat</button>
          <button class="date-day" data-day="0">sun</button>
        </div>
        <p class="date-modal-section-label">or pick a date</p>
        <input type="date" id="dateModalInput" class="date-modal-input" />
      </div>
      <div class="date-modal-actions">
        <button class="date-modal-btn date-modal-clear" id="dateModalClear">clear date</button>
        <button class="date-modal-btn date-modal-done" id="dateModalDone">save</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
